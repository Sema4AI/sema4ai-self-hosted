        X-SMTP-Host: '**********'
        X-SMTP-Password:
          type: secret
          value: '**********'
        X-SMTP-Port: '**********'
        X-SMTP-Username: '**********'
      force-serial-tool-calls: false
    conversation-starter: ''
    document-intelligence: v2.1
